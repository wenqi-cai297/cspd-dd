[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "cspd-stage1"
version = "0.1.0"
description = "Prep + Stage 1 scaffold for CSPD (metadata prep, attribute extraction, normalization, canonical render)"
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
  "tqdm>=4.66",
  "pillow",
  "transformers",
  "accelerate",
  "sentencepiece",
]

[project.scripts]
cspd-stage1 = "cspd_stage1.cli:main"

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]
