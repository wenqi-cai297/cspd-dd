[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "cspd-stage1"
version = "0.1.0"
description = "Stage 1 attribute extraction scaffold for CSPD"
readme = "README.md"
requires-python = ">=3.10"
dependencies = []

[project.scripts]
cspd-stage1 = "cspd_stage1.cli:main"

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]
